<!DOCTYPE html>
<html lang="pt-PT">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Mobile Base</title>
	<link rel="stylesheet" href="styles/base.css" />
	<link rel="stylesheet" href="styles/root.css" />
	<link rel="stylesheet" href="styles/utilities.css" />
	<link rel="stylesheet" href="styles/buttons.css" />
	<link rel="stylesheet" href="styles/mobile.css" />
</head>
<body class="bg-warm">
	<div class="mobile-shell bg-mobile" aria-label="Mobile shell">
		<header class="mobile-header">
			<div class="mobile-header-content">
				<h1>PDMS</h1>
				<div class="mobile-user">
					Bem-vindo, <strong>Joao</strong>
				</div>
			</div>
		</header>

		<main class="mobile-main">
			<h2>Shell mobile com fundo proprio</h2>
			<div class="mobile-apps-grid">
				<article class="mobile-app-card">
					<h3>Accoes rapidas</h3>
					<p>Um botao por variante em coluna.</p>
					<div class="btn-stack">
						<button type="button" class="btn btn-primary btn-lg btn-block">btn-primary</button>
						<button type="button" class="btn btn-secondary btn-lg btn-block">btn-secondary</button>
						<button type="button" class="btn btn-ghost btn-lg btn-block">btn-ghost</button>
						<button type="button" class="btn btn-danger btn-lg btn-block">btn-danger</button>
					</div>
				</article>
			</div>
		</main>
	</div>
</body>
</html>
